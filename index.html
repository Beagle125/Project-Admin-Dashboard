<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Admin-Dashboard</title>
</head>
<body>
    <div class="master-container">
        <div class="sidebar-container">
            <div class="sidebar-upper">
                <div class="sidebar-header">
                    <img src="./static/placeholder.svg" alt="logo">
                    <h2>Dashboard</h2>
                </div>
                <div class="sidebar-top">
                    <div class="sidebar-content hover">
                        <img src="./static/placeholder.svg" alt="logo">
                        <h4>Home</h4>
                    </div>
                    <div class="sidebar-content hover">
                        <img src="./static/placeholder.svg" alt="logo">
                        <h4>Profile</h4>
                    </div>
                    <div class="sidebar-content hover">
                        <img src="./static/placeholder.svg" alt="logo">
                        <h4>Messages</h4>
                    </div>
                    <div class="sidebar-content hover">
                        <img src="./static/placeholder.svg" alt="logo">
                        <h4>History</h4>
                    </div>
                    <div class="sidebar-content hover">
                        <img src="./static/placeholder.svg" alt="logo">
                        <h4>Tasks</h4>
                    </div>
                    <div class="sidebar-content hover">
                        <img src="./static/placeholder.svg" alt="logo">
                        <h4>Communities</h4>
                    </div>
                </div>
                <div class="sidebar-bottom">
                    <div class="sidebar-content hover">
                        <img src="./static/placeholder.svg" alt="logo">
                        <h4>Settings</h4>
                    </div>
                    <div class="sidebar-content hover">
                        <img src="./static/placeholder.svg" alt="logo">
                        <h4>Support</h4>
                    </div>
                    <div class="sidebar-content hover">
                        <img src="./static/placeholder.svg" alt="logo">
                        <h4>Privacy</h4>
                    </div>
                </div>
            </div>
            <div class="sidebar-lower">

            </div>
        </div>

        <div class="navbar-container">
            <div class="navbar-section-search">
                <img class="hover" src="./static/placeholder.svg">
                <form method="POST" id="navbar-form">
                    <input type="search" id="search" name="search>">
                </form>
            </div>
            <div class="navbar-section-buttons">
                <img class="hover" src="./static/placeholder.svg">
                <img src="./static/placeholder.svg">
                <h4>Twynsta Beagle</h4>
            </div>
        </div>

        <div class="greet-container">
            <h1>Greet</h1>
        </div>

        <div class="board-container">
            <h1>Board</h1>
        </div>
    </div>
</body>
</html>
